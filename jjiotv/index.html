<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JioTV Live</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#0f0f14;
    color:#fff;
}

header{
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:600;
    background:#111;
    border-bottom:1px solid #222;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:18px;
    padding:18px;
}

.card{
    background:#1a1a25;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #222;
    transition:.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.logo{
    height:130px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:center;
}

.logo img{
    max-width:85%;
    max-height:90px;
}

.info{
    padding:12px;
}

.name{
    font-size:14px;
    font-weight:600;
    margin-bottom:6px;
}

.meta{
    font-size:12px;
    color:#aaa;
}

.loading{
    text-align:center;
    padding:40px;
}
</style>
</head>

<body>

<header>📺 JioTV Sports</header>

<div id="loading" class="loading">Loading channels...</div>
<div class="grid" id="channelGrid"></div>

<script>
const apiURL = "https://allrounderid2.pages.dev/api/jiotv2.json";

fetch(apiURL)
.then(response => response.json())
.then(channels => {

    document.getElementById("loading").style.display = "none";
    const grid = document.getElementById("channelGrid");

    channels.forEach(channel => {

        const card = document.createElement("div");
        card.className = "card";

        // Save full channel data inside card
        card.dataset.url = channel.channel_url;
        card.dataset.keyid = channel.keyId;
        card.dataset.key = channel.key;
        card.dataset.cookie = channel.cookie;

        card.innerHTML = `
            <div class="logo">
                <img src="${channel.channel_logo}" alt="${channel.channel_name}">
            </div>
            <div class="info">
                <div class="name">${channel.channel_name}</div>
                <div class="meta">${channel.channel_genre} • ${channel.language}</div>
            </div>
        `;

        grid.appendChild(card);
    });

})
.catch(error => {
    document.getElementById("loading").innerHTML = "Failed to load channels.";
});
</script>

</body>
</html>
